name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      tag:
        description: "Release tag (e.g. v0.8.0)"
        required: true
        type: string

jobs:
  build:
    name: Build Windows installer
    runs-on: windows-latest
    environment: release
    permissions:
      contents: write
      id-token: write
    env:
      SIGNPATH_API_TOKEN: ${{ secrets.SIGNPATH_API_TOKEN }}

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9
          run_install: false

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Rust cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: ./src-tauri -> target

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Type check
        run: pnpm exec svelte-check

      # Regenerate src-tauri/data/*.json from the TS catalog so the embedded
      # CLI catalog (cli.rs `include_str!`) can never drift from the GUI
      # source-of-truth, even if someone forgets `pnpm catalog:export` locally.
      - name: Export catalog JSON
        run: pnpm catalog:export

      - name: Build Tauri bundle
        env:
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        run: pnpm tauri build

      - name: Resolve version
        id: version
        shell: pwsh
        run: |
          $tag = if ("${{ github.event_name }}" -eq "workflow_dispatch") { "${{ inputs.tag }}" } else { "${{ github.ref_name }}" }
          $version = $tag -replace '^v', ''
          "tag=$tag"         | Out-File -FilePath $env:GITHUB_OUTPUT -Append
          "version=$version" | Out-File -FilePath $env:GITHUB_OUTPUT -Append

      - name: Build portable binary
        run: pnpm tauri:build:portable

      - name: Stage installer artifacts
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path staging | Out-Null
          # Copy installers AND their .sig sidecars — the updater manifest step
          # needs the .sig file produced by `tauri build` with the signing key.
          Get-ChildItem "src-tauri/target/release/bundle/nsis/*" -Include "*.exe","*.exe.sig" -File | Copy-Item -Destination staging
          Get-ChildItem "src-tauri/target/release/bundle/msi/*"  -Include "*.msi","*.msi.sig" -File | Copy-Item -Destination staging
          Get-ChildItem staging

      - name: Upload unsigned bundle for signing
        if: env.SIGNPATH_API_TOKEN != ''
        id: upload-unsigned
        uses: actions/upload-artifact@v4
        with:
          name: reclaim-unsigned
          path: staging/*

      - name: SignPath signing request
        if: env.SIGNPATH_API_TOKEN != ''
        uses: signpath/github-action-submit-signing-request@v1.2
        with:
          api-token: ${{ secrets.SIGNPATH_API_TOKEN }}
          organization-id: ${{ secrets.SIGNPATH_ORGANIZATION_ID }}
          project-slug: ${{ secrets.SIGNPATH_PROJECT_SLUG }}
          signing-policy-slug: ${{ secrets.SIGNPATH_SIGNING_POLICY_SLUG }}
          github-artifact-id: ${{ steps.upload-unsigned.outputs.artifact-id }}
          wait-for-completion: true
          output-artifact-directory: signed

      - name: Replace staging with signed artifacts
        if: env.SIGNPATH_API_TOKEN != ''
        shell: pwsh
        run: |
          Remove-Item staging/* -Force
          Copy-Item signed/* staging/ -Force
          Get-ChildItem staging

      - name: Regenerate Tauri updater signatures on signed binaries
        if: env.SIGNPATH_API_TOKEN != ''
        env:
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        shell: pwsh
        run: |
          $keyFile = Join-Path $env:RUNNER_TEMP "tauri-updater.key"
          Set-Content -Path $keyFile -Value $env:TAURI_SIGNING_PRIVATE_KEY -NoNewline
          try {
            Get-ChildItem staging -Include "*.exe","*.msi" -File | ForEach-Object {
              pnpm exec tauri signer sign --private-key $keyFile --password $env:TAURI_SIGNING_PRIVATE_KEY_PASSWORD $_.FullName
              if ($LASTEXITCODE -ne 0) { throw "tauri signer sign failed for $($_.Name)" }
            }
          } finally {
            Remove-Item $keyFile -Force -ErrorAction SilentlyContinue
          }

      - name: Upload installer artifact
        uses: actions/upload-artifact@v4
        with:
          name: reclaim-windows-installer
          path: staging/*

      - name: Generate updater manifest
        if: env.TAURI_SIGNING_PRIVATE_KEY != ''
        env:
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
        shell: pwsh
        run: |
          $version = "${{ steps.version.outputs.version }}"
          $tag     = "${{ steps.version.outputs.tag }}"
          $nsis    = Get-ChildItem -Path staging -Filter "*setup.exe" | Select-Object -First 1
          $sigFile = Get-ChildItem -Path staging -Filter "*setup.exe.sig" | Select-Object -First 1
          if (-not $nsis -or -not $sigFile) {
            Write-Error "Could not locate NSIS installer + updater signature"
            exit 1
          }
          $signature = Get-Content -Path $sigFile.FullName -Raw
          $manifest = @{
            version   = $version
            notes     = "See release notes on GitHub"
            pub_date  = (Get-Date -Format "yyyy-MM-ddTHH:mm:ssZ")
            platforms = @{
              "windows-x86_64" = @{
                signature = $signature.Trim()
                url       = "https://github.com/${{ github.repository }}/releases/download/$tag/$($nsis.Name)"
              }
            }
          }
          $manifest | ConvertTo-Json -Depth 5 | Out-File -FilePath "latest.json" -Encoding utf8

      - name: Stage portable binary
        shell: pwsh
        run: |
          $version = "${{ steps.version.outputs.version }}"
          $exe = "src-tauri/target/release/reclaim.exe"
          if (-not (Test-Path $exe)) { Write-Error "Portable binary not found at $exe"; exit 1 }
          $dest = "staging/Reclaim-Portable-v$version.exe"
          Copy-Item $exe -Destination $dest -Force
          Get-ChildItem staging

      - name: Publish GitHub release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.version.outputs.tag }}
          name: Reclaim ${{ steps.version.outputs.tag }}
          draft: true
          generate_release_notes: true
          body: |
            ## Install

            One-liner in PowerShell — picks installer or portable for you and bypasses Edge's "publisher unknown" prompt:

            ```powershell
            irm "https://github.com/jonax1337/reclaim/raw/main/install.ps1" | iex
            ```

            Or pick the mode upfront (non-interactive):

            ```powershell
            $env:RECLAIM_MODE = 'portable'; irm "https://github.com/jonax1337/reclaim/raw/main/install.ps1" | iex
            # Valid: install | portable | msi
            ```

            ### Manual download

            | Asset | When to use |
            | --- | --- |
            | `Reclaim_${{ steps.version.outputs.version }}_x64-setup.exe` | NSIS installer — recommended for most users (~2 MB stub, downloads Webview2 if needed) |
            | `Reclaim-Portable-v${{ steps.version.outputs.version }}.exe` | Single-exe portable — no install, stateless on disk |
            | `Reclaim_${{ steps.version.outputs.version }}_x64_en-US.msi` | MSI installer for managed deployment (Intune / GPO) |

            The `.sig` files and `latest.json` are for Reclaim's built-in auto-updater — you don't need to download them manually.

            ---
          files: |
            staging/*.exe
            staging/*.exe.sig
            staging/*.msi
            staging/*.msi.sig
            staging/*.zip
            latest.json
