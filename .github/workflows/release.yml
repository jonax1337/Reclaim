name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      tag:
        description: "Release tag (e.g. v0.8.0)"
        required: true
        type: string

jobs:
  build:
    name: Build Windows installer
    runs-on: windows-latest
    environment: release
    permissions:
      contents: write
      id-token: write
    env:
      SIGNPATH_API_TOKEN: ${{ secrets.SIGNPATH_API_TOKEN }}

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9
          run_install: false

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Rust cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: ./src-tauri -> target

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Type check
        run: pnpm exec svelte-check

      - name: Build Tauri bundle
        env:
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        run: pnpm tauri build

      - name: Resolve version
        id: version
        shell: pwsh
        run: |
          $tag = if ("${{ github.event_name }}" -eq "workflow_dispatch") { "${{ inputs.tag }}" } else { "${{ github.ref_name }}" }
          $version = $tag -replace '^v', ''
          "tag=$tag"         | Out-File -FilePath $env:GITHUB_OUTPUT -Append
          "version=$version" | Out-File -FilePath $env:GITHUB_OUTPUT -Append

      - name: Stage installer artifacts
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path staging | Out-Null
          Get-ChildItem src-tauri/target/release/bundle/nsis -Filter "*.exe" | Copy-Item -Destination staging
          Get-ChildItem src-tauri/target/release/bundle/msi  -Filter "*.msi" | Copy-Item -Destination staging
          Get-ChildItem staging

      - name: Upload unsigned bundle for signing
        if: env.SIGNPATH_API_TOKEN != ''
        id: upload-unsigned
        uses: actions/upload-artifact@v4
        with:
          name: reclaim-unsigned
          path: staging/*

      - name: SignPath signing request
        if: env.SIGNPATH_API_TOKEN != ''
        uses: signpath/github-action-submit-signing-request@v1.2
        with:
          api-token: ${{ secrets.SIGNPATH_API_TOKEN }}
          organization-id: ${{ secrets.SIGNPATH_ORGANIZATION_ID }}
          project-slug: ${{ secrets.SIGNPATH_PROJECT_SLUG }}
          signing-policy-slug: ${{ secrets.SIGNPATH_SIGNING_POLICY_SLUG }}
          github-artifact-id: ${{ steps.upload-unsigned.outputs.artifact-id }}
          wait-for-completion: true
          output-artifact-directory: signed

      - name: Replace staging with signed artifacts
        if: env.SIGNPATH_API_TOKEN != ''
        shell: pwsh
        run: |
          Remove-Item staging/* -Force
          Copy-Item signed/* staging/ -Force
          Get-ChildItem staging

      - name: Regenerate Tauri updater signatures on signed binaries
        if: env.SIGNPATH_API_TOKEN != ''
        env:
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        shell: pwsh
        run: |
          $keyFile = Join-Path $env:RUNNER_TEMP "tauri-updater.key"
          Set-Content -Path $keyFile -Value $env:TAURI_SIGNING_PRIVATE_KEY -NoNewline
          try {
            Get-ChildItem staging -Include "*.exe","*.msi" -File | ForEach-Object {
              pnpm exec tauri signer sign --private-key $keyFile --password $env:TAURI_SIGNING_PRIVATE_KEY_PASSWORD $_.FullName
              if ($LASTEXITCODE -ne 0) { throw "tauri signer sign failed for $($_.Name)" }
            }
          } finally {
            Remove-Item $keyFile -Force -ErrorAction SilentlyContinue
          }

      - name: Upload installer artifact
        uses: actions/upload-artifact@v4
        with:
          name: reclaim-windows-installer
          path: staging/*

      - name: Generate updater manifest
        if: env.TAURI_SIGNING_PRIVATE_KEY != ''
        env:
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
        shell: pwsh
        run: |
          $version = "${{ steps.version.outputs.version }}"
          $tag     = "${{ steps.version.outputs.tag }}"
          $nsis    = Get-ChildItem -Path staging -Filter "*.exe" | Where-Object { $_.Name -notlike "*.sig" } | Select-Object -First 1
          $sigFile = Get-ChildItem -Path staging -Filter "*.exe.sig" | Select-Object -First 1
          if (-not $nsis -or -not $sigFile) {
            Write-Error "Could not locate NSIS installer + updater signature"
            exit 1
          }
          $signature = Get-Content -Path $sigFile.FullName -Raw
          $manifest = @{
            version   = $version
            notes     = "See release notes on GitHub"
            pub_date  = (Get-Date -Format "yyyy-MM-ddTHH:mm:ssZ")
            platforms = @{
              "windows-x86_64" = @{
                signature = $signature.Trim()
                url       = "https://github.com/${{ github.repository }}/releases/download/$tag/$($nsis.Name)"
              }
            }
          }
          $manifest | ConvertTo-Json -Depth 5 | Out-File -FilePath "latest.json" -Encoding utf8

      - name: Publish GitHub release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.version.outputs.tag }}
          name: Reclaim ${{ steps.version.outputs.tag }}
          draft: true
          generate_release_notes: true
          files: |
            staging/*.exe
            staging/*.exe.sig
            staging/*.msi
            staging/*.msi.sig
            latest.json
